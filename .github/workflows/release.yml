name: release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write   # action-gh-release 创建 Release 需要

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  archive: tar.gz }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl, archive: tar.gz }
          - { os: macos-latest,   target: x86_64-apple-darwin,       archive: tar.gz }
          - { os: macos-latest,   target: aarch64-apple-darwin,      archive: tar.gz }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    archive: zip    }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl tools (linux-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          name="vasm-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/vasm" "dist/${name}/"
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "dist/${name}/"
          tar -czvf "dist/${name}.tar.gz" -C dist "${name}"
          rm -rf "dist/${name}"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $name = "vasm-$env:GITHUB_REF_NAME-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/vasm.exe" "dist/$name/"
          Copy-Item README.md, CHANGELOG.md, LICENSE-MIT, LICENSE-APACHE "dist/$name/"
          Compress-Archive -Path "dist/$name/*" -DestinationPath "dist/$name.zip"
          Remove-Item -Recurse "dist/$name"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true   # 自动从 PR / commit 生成（与 CHANGELOG.md 互补）
          fail_on_unmatched_files: true
